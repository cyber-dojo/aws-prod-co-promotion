name: Promote one artifact to production

on:
  workflow_dispatch:
    inputs:
      service:
        description: "The name of the service to deploy"
        type: choice
        required: true
        options:
          - CHOOSE-ONE-FROM-THE-LIST
          - creator
          - custom-start-points
          - dashboard
          - differ
          - exercises-start-points
          - languages-start-points
          - nginx
          - runner
          - saver
          - web

env:
  KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
  KOSLI_AWS_PROD:  ${{ vars.KOSLI_AWS_PROD }}          # aws-prod
  KOSLI_DEBUG:     ${{ vars.KOSLI_DEBUG }}             # true/false
  KOSLI_DRY_RUN:   ${{ vars.KOSLI_DRY_RUN }}           # true/false
  KOSLI_HOST:      ${{ vars.KOSLI_HOST }}              # https://app.kosli.com
  KOSLI_ORG:       ${{ vars.KOSLI_ORG }}               # cyber-dojo
  KOSLI_FLOW:      ${{ vars.KOSLI_FLOW }}              # production-promotion

  AWS_ECR_ID:          ${{ vars.AWS_ECR_ID }}
  AWS_REGION:          ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID_PROD: ${{ vars.AWS_ACCOUNT_ID_PROD }}

jobs:
  setup:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      aws_account_id_prod:      ${{ steps.vars.outputs.aws_account_id_prod }}
      ecr_registry:             ${{ steps.vars.outputs.ecr_registry }}
      aws_region:               ${{ steps.vars.outputs.aws_region }}
      gh_actions_iam_role_name: ${{ steps.vars.outputs.gh_actions_iam_role_name }}
      kosli_trail:              ${{ steps.vars.outputs.kosli_trail }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare outputs for workflow jobs
        id: vars
        run: |
          ECR_REGISTRY="${AWS_ECR_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "aws_account_id_prod=${AWS_ACCOUNT_ID_PROD}"     >> ${GITHUB_OUTPUT}                    
          echo "ecr_registry=${ECR_REGISTRY}"                   >> ${GITHUB_OUTPUT}
          echo "aws_region=${AWS_REGION}"                       >> ${GITHUB_OUTPUT}
          echo "gh_actions_iam_role_name=gh_actions_services"   >> ${GITHUB_OUTPUT}
          kosli_trail="promotion-one-${{ github.run_number }}"
          echo "kosli_trail=${kosli_trail}" >> ${GITHUB_OUTPUT}
          echo "KOSLI_TRAIL=${kosli_trail}" >> ${GITHUB_ENV}

      - name: Begin Kosli Trail
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: cyber-dojo/kosli-begin-trail@main
        with:
          cli_version: latest
          flow_description: "Promotes sets of Artifacts from aws-beta to aws-prod"
          template_filename: ".kosli.one.yml"

      - name: Tag Kosli Flow
        run:
          kosli tag flow "${KOSLI_FLOW}"
            --set env=${KOSLI_AWS_PROD}
            --set kind=release
            --set repo_url="${{ github.server_url }}/${{ github.repository }}"
            --set ci=github

  find-promotions:
    needs: [setup]
    runs-on: ubuntu-latest
    env:
      KOSLI_TRAIL: ${{ needs.setup.outputs.kosli_trail }}
    outputs:
      promotions: "${{ steps.vars.outputs.promotions }}"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v5
        with:
          version: latest

      - name: Generate JSON for each Artifact promotion for use in the following job's strategy:matrix:include
        id: vars
        run: |
          export CYBER_DOJO_PROMOTE_FLOW="${{ inputs.service }}"
          promotions="$(make promotions | jq --raw-output --compact-output .)"
          echo "promotions=${promotions}" >> ${GITHUB_OUTPUT}

      - name: Attest promotion summary to Kosli
        run:
          kosli attest generic 
            --name one-promotion
            $(cat all-annotations.txt)

  snyk-scan:
    if: ${{ needs.find-promotions.outputs.promotions != '[]' }}
    needs:
      - setup
      - find-promotions
    strategy:
      matrix:
        include: ${{ fromJSON(needs.find-promotions.outputs.promotions) }}
    uses: cyber-dojo/snyk-scanning/.github/workflows/artifact_snyk_test.yml@main
    with:
      artifact_name:          ${{ matrix.incoming_image_name }}
      kosli_flow:             ${{ vars.KOSLI_FLOW }}
      kosli_trail:            ${{ needs.setup.outputs.kosli_trail }}
      kosli_attestation_name: ${{ matrix.incoming_repo_name }}.snyk-scan
      kosli_env:              ${{ vars.KOSLI_AWS_PROD }}
      repo_name:              ${{ matrix.incoming_repo_name }}
      raw_snyk_policy_url:    ${{ matrix.incoming_raw_snyk_policy_url }}
    secrets:
      snyk_token:      ${{ secrets.SNYK_TOKEN }}
      kosli_api_token: ${{ secrets.KOSLI_API_TOKEN }}


  sdlc-control-gate:
    if: ${{ needs.find-promotions.outputs.promotions != '[]' }}
    needs:
      - setup
      - find-promotions
      - snyk-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.find-promotions.outputs.promotions) }}
    env:
      KOSLI_TRAIL: ${{ needs.setup.outputs.kosli_trail }}
      PROMOTION: ${{ toJSON(matrix) }}
    steps:
      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v5
        with:
          version: latest

      - name: Assert Artifact is compliant for aws-prod
        run: |
          unset KOSLI_FLOW
          kosli assert artifact \
            --fingerprint "${{ matrix.incoming_fingerprint }}" \
            --environment "${KOSLI_AWS_PROD}"

      # [kosli attest artifact] requires a git repo
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # [kosli attest artifact] should not be necessary here, but currently it is.
      - name: Attest artifact to Kosli
        run:
          kosli attest artifact "${{ matrix.incoming_image_name }}"
            --fingerprint "${{ matrix.incoming_fingerprint }}"
            --name "${{ matrix.incoming_repo_name }}"

      - name: Attest aws-prod compliance
        run: |
          echo "${PROMOTION}" | jq . > one-promotion.json          
          kosli attest decision \
            --compliant=true \
            --control SDLC-CTRL-0013 \
            --annotate deployment_diff_URL="${{ matrix.deployment_diff_url }}" \
            --fingerprint "${{ matrix.incoming_fingerprint }}" \
            --name "compliant-${KOSLI_AWS_PROD}" \
            --user-data one-promotion.json          


  approve:
    if: ${{ needs.find-promotions.outputs.promotions != '[]' }}
    needs:
      - find-promotions
      - sdlc-control-gate
    runs-on: ubuntu-latest
    environment:
      name: production
      url:  https://cyber-dojo.org
    strategy:
      matrix:
        include: ${{ fromJSON(needs.find-promotions.outputs.promotions) }}
    steps:
      - name: Await manual approval
        run: echo "Approved"


  deploy-to-prod:
    if: ${{ needs.find-promotions.outputs.promotions != '[]' }}
    needs:
      - setup
      - find-promotions
      - approve
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.find-promotions.outputs.promotions) }}
    permissions:
      id-token: write
      contents: write
      pull-requests: read
    uses: kosli-dev/tf/.github/workflows/apply.yml@main
    name: "Prod apply ${{ matrix.incoming_repo_name }}"
    with:
      github_repository_to_checkout: "cyber-dojo/${{ matrix.incoming_repo_name }}"
      github_repository_name:        ${{ matrix.incoming_repo_name }}
      ref:                           ${{ matrix.incoming_commit_sha }}
      pass_commit_to_kosli_commands: true
      working_directory:             deployment/terraform/
      aws_region:                    eu-central-1
      aws_role_arn:                  arn:aws:iam::${{ needs.setup.outputs.aws_account_id_prod }}:role/${{ needs.setup.outputs.gh_actions_iam_role_name }}
      environment:                   prod
      tf_version:                    v1.14.9
      tf_vars: |
        TF_VAR_TAGGED_IMAGE=${{ matrix.incoming_image_name }}
      kosli_host:                    ${{ vars.KOSLI_HOST }}
      kosli_org:                     ${{ vars.KOSLI_ORG }}
      kosli_template_file:           flow-templates/kosli-apply.yml
    secrets:
      kosli_api_token:    "${{ secrets.KOSLI_API_TOKEN}}"
